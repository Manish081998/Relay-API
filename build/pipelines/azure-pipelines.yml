# Azure DevOps pipeline for Project Relay API.
# Mirrors the architecture document's "build-time guarantees":
#   1. restore & build with warnings-as-errors
#   2. run unit tests
#   3. run architecture tests (NetArchTest) — hard gate on module boundaries
#   4. run integration tests (Testcontainers + SQL Server)
#   5. publish the API project
#   6. upload artifacts + code coverage

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - API/**

pr:
  branches:
    include:
      - main

variables:
  solution: 'API/ProjectRelay.sln'
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.0.100'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: build_and_test
    displayName: Build & test
    jobs:
      - job: build
        displayName: Restore, build, test
        timeoutInMinutes: 30
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK $(dotnetSdkVersion)
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: $(solution)

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: $(solution)
              arguments: >
                --configuration $(buildConfiguration)
                --no-restore
                -p:TreatWarningsAsErrors=true

          - task: DotNetCoreCLI@2
            displayName: Unit tests
            inputs:
              command: test
              projects: 'API/tests/Unit/**/*.csproj'
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --logger "trx;LogFileName=unit.trx"
                --collect:"XPlat Code Coverage"

          - task: DotNetCoreCLI@2
            displayName: Architecture tests (module boundary gate)
            inputs:
              command: test
              projects: 'API/tests/Architecture/**/*.csproj'
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --logger "trx;LogFileName=architecture.trx"

          - task: DotNetCoreCLI@2
            displayName: Integration tests (Testcontainers)
            inputs:
              command: test
              projects: 'API/tests/Integration/**/*.csproj'
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --logger "trx;LogFileName=integration.trx"
            env:
              TESTCONTAINERS_RYUK_DISABLED: 'true'

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/*.trx'
              mergeTestResults: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish coverage
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'

          - task: DotNetCoreCLI@2
            displayName: Publish Relay.Api
            inputs:
              command: publish
              publishWebProjects: false
              projects: 'API/src/Host/Relay.Api/Relay.Api.csproj'
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --output $(Build.ArtifactStagingDirectory)/Relay.Api
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: Upload artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)
              ArtifactName: relay-api
