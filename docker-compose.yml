services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: relay-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Relay_Local_Dev!2026}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - relay-sql-data:/var/opt/mssql
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  relay-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Intranet: "Server=sqlserver,1433;Database=ProjectRelay;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Relay_Local_Dev!2026};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Documentum: "Server=sqlserver,1433;Database=ProjectRelay;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Relay_Local_Dev!2026};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__WebSelect: "Server=sqlserver,1433;Database=ProjectRelay;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Relay_Local_Dev!2026};TrustServerCertificate=True;Encrypt=False"

volumes:
  relay-sql-data:
